<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nordkern Fitness – Kontakt / FAQ</title>
  <meta
    name="description"
    content="Kontakt zu Nordkern Fitness aufnehmen und Antworten auf häufige Fragen zu Mitgliedschaft, Tagespass, App, Standort, Zugang und Getränkeautomat finden."
  />

  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png?v=3" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png?v=3" />
  <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png?v=3" />
  <link rel="icon" type="image/png" sizes="512x512" href="images/icon-512.png?v=3" />
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png?v=3" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .contact-page-v3 {
      background: #ffffff;
    }

    .contact-hero-v3 {
      min-height: 72vh;
      display: grid;
      place-items: center;
      padding: max(8.4rem, 13vh) 1rem clamp(3.6rem, 5.6vw, 5.6rem);
      text-align: center;
      background: #ffffff;
    }

    .contact-hero-inner-v3 {
      width: min(100%, 980px);
      margin-inline: auto;
    }

    .contact-hero-v3 h1 {
      color: var(--text);
      font-size: clamp(3.6rem, 6.5vw, 6.9rem);
      line-height: 0.92;
      letter-spacing: -0.074em;
      font-weight: 790;
      text-wrap: balance;
    }

    .contact-hero-v3 p:not(.eyebrow) {
      max-width: 700px;
      margin: 1rem auto 0;
      color: var(--text-soft);
      font-size: clamp(1.04rem, 1.26vw, 1.2rem);
      line-height: 1.48;
      letter-spacing: -0.018em;
      text-wrap: balance;
    }

    @media (max-width: 720px) {
      .contact-hero-v3 {
        min-height: 68vh;
        padding-top: max(8.2rem, 14vh);
        padding-bottom: 3.2rem;
      }

      .contact-hero-v3 h1 {
        font-size: clamp(2.8rem, 12vw, 4.3rem);
        line-height: 0.94;
      }

      .contact-hero-v3 p:not(.eyebrow) {
        max-width: 34ch;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div data-header></div>

  <main class="contact-page-v3">
    <section class="contact-hero-v3" aria-labelledby="contact-page-title">
      <div class="contact-hero-inner-v3">
        <p class="eyebrow">Kontakt / FAQ</p>

        <h1 id="contact-page-title">Fragen klären. Einfach melden.</h1>

        <p>
          Schreib Nordkern Fitness direkt über das Kontaktformular oder schau in die FAQ.
          Viele Antworten zu App, Tarifen, Tagespass und Studio findest du weiter unten.
        </p>

        <div class="product-actions">
          <a href="#kontaktformular" class="product-link product-link-primary">
            Kontaktformular öffnen
          </a>

          <a href="#faq" class="product-link product-link-secondary">
            FAQ ansehen
          </a>
        </div>
      </div>
    </section>

    <div data-contact-form></div>

    <div data-faq></div>
  </main>

  <div data-footer></div>

  <script src="js/main.js"></script>
</body>
</html>
