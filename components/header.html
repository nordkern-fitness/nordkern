<style>
  .site-header {
    position: fixed;
    inset: 0 0 auto;
    z-index: 9000;
    padding: 1rem 0;
    background: transparent;
    pointer-events: none;
  }

  .site-header .container {
    pointer-events: none;
  }

  .site-header-inner {
    position: relative;
    width: 100%;
    max-width: var(--max-width);
    min-height: 58px;
    margin-inline: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.25rem;
    padding: 0.18rem 0.52rem 0.18rem 0.72rem;
    border: 1px solid transparent;
    border-radius: var(--radius-pill);
    background: transparent;
    box-shadow: none;
    backdrop-filter: blur(0) saturate(100%);
    -webkit-backdrop-filter: blur(0) saturate(100%);
    pointer-events: auto;
    transition:
      background-color var(--fast),
      border-color var(--fast),
      box-shadow var(--fast),
      backdrop-filter var(--fast),
      -webkit-backdrop-filter var(--fast);
  }

  .site-header-inner.scrolled {
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.72));
    border-color: rgba(255, 255, 255, 0.82);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.94),
      0 16px 42px rgba(0, 0, 0, 0.09);
    backdrop-filter: blur(28px) saturate(175%);
    -webkit-backdrop-filter: blur(28px) saturate(175%);
  }

  .logo {
    display: inline-flex;
    align-items: center;
    justify-content: flex-start;
    flex: 0 0 auto;
    width: 190px;
    height: 58px;
    line-height: 0;
    overflow: visible;
    transform: translateZ(0);
  }

  .logo img {
    width: auto;
    height: 70px;
    max-width: 178px;
    object-fit: contain;
    image-rendering: auto;
    transform: translateY(1px) translateZ(0);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .site-nav,
  .burger {
    position: relative;
    z-index: 5;
  }

  .site-nav ul {
    display: flex;
    align-items: center;
    gap: 0.18rem;
  }

  .site-nav a {
    position: relative;
    display: inline-flex;
    align-items: center;
    min-height: 38px;
    padding: 0.54rem 0.78rem;
    border-radius: var(--radius-pill);
    color: rgba(29, 29, 31, 0.76);
    font-size: 0.94rem;
    font-weight: 630;
    letter-spacing: -0.014em;
    transition:
      color var(--fast),
      background var(--fast),
      transform var(--fast);
  }

  .site-nav a:hover,
  .site-nav a:focus-visible {
    color: var(--text);
    background: rgba(255, 255, 255, 0.52);
    transform: translateY(-1px);
  }

  .nav-link.active,
  .nav-link.active:hover,
  .nav-link.active:focus-visible {
    color: var(--nf-green-dark) !important;
    background: transparent !important;
    box-shadow: none !important;
  }

  .nav-link.active::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0.22rem;
    width: 18px;
    height: 2px;
    border-radius: var(--radius-pill);
    background: var(--nf-green);
    transform: translateX(-50%);
  }

  .burger {
    width: 42px;
    height: 42px;
    display: none;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    border-radius: 50%;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.68));
    border: 1px solid rgba(255, 255, 255, 0.78);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.9),
      0 12px 28px rgba(0, 0, 0, 0.07);
    backdrop-filter: blur(24px) saturate(170%);
    -webkit-backdrop-filter: blur(24px) saturate(170%);
    transition:
      background var(--fast),
      box-shadow var(--fast),
      transform var(--fast);
  }

  .burger:hover,
  .burger:focus-visible {
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.76));
    transform: translateY(-1px);
  }

  .burger-lines {
    position: relative;
    width: 18px;
    height: 14px;
    display: block;
  }

  .burger-lines span {
    position: absolute;
    left: 50%;
    width: 18px;
    height: 1.7px;
    border-radius: var(--radius-pill);
    background: rgba(29, 29, 31, 0.9);
    transform: translateX(-50%);
    transform-origin: center;
    transition:
      top 0.22s var(--ease),
      transform 0.22s var(--ease),
      opacity 0.16s var(--ease),
      width 0.22s var(--ease);
  }

  .burger-lines span:nth-child(1) {
    top: 2px;
  }

  .burger-lines span:nth-child(2) {
    top: 6.5px;
  }

  .burger-lines span:nth-child(3) {
    top: 11px;
  }

  .burger.is-active .burger-lines span:nth-child(1) {
    top: 6.5px;
    transform: translateX(-50%) rotate(45deg);
  }

  .burger.is-active .burger-lines span:nth-child(2) {
    opacity: 0;
    width: 0;
  }

  .burger.is-active .burger-lines span:nth-child(3) {
    top: 6.5px;
    transform: translateX(-50%) rotate(-45deg);
  }

  @media (max-width: 980px) {
    body.nav-open::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 8998;
      background: rgba(251, 251, 253, 0.86);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      animation: mobileMenuBackdropIn 0.2s var(--ease) both;
    }

    .site-header {
      z-index: 10000;
      padding: 0.95rem 0;
    }

    .site-header-inner,
    .site-header-inner.scrolled {
      width: 100%;
      max-width: 100%;
      min-height: 54px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .logo {
      position: relative;
      z-index: 10004;
      width: 160px;
      height: 54px;
      justify-content: flex-start;
    }

    .logo img {
      height: 58px;
      max-width: 150px;
    }

    .burger {
      position: relative;
      z-index: 10004;
      width: 46px;
      height: 46px;
      display: inline-flex;
    }

    .burger:hover,
    .burger.is-active {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.74));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        0 14px 30px rgba(0, 0, 0, 0.09);
    }

    .burger-lines {
      width: 18px;
      height: 14px;
    }

    .burger-lines span {
      height: 1.65px;
      width: 17px;
      background: rgba(29, 29, 31, 0.86);
    }

    .site-nav {
      position: fixed;
      inset: 0;
      z-index: 9999;
      width: 100%;
      height: 100vh;
      max-height: none;
      display: block;
      margin: 0;
      padding: 7.2rem 2rem 2.4rem;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-8px);
      transition:
        opacity 0.2s var(--ease),
        visibility 0.2s var(--ease),
        transform 0.2s var(--ease);
      background: rgba(251, 251, 253, 0.9);
      backdrop-filter: blur(28px) saturate(165%);
      -webkit-backdrop-filter: blur(28px) saturate(165%);
    }

    .site-nav.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
      animation: mobileNavIn 0.2s var(--ease) both;
    }

    .site-nav ul {
      width: min(100%, 430px);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.1rem;
      padding: 0;
      margin: 0 auto;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      overflow: visible;
    }

    .site-nav li {
      display: block;
      opacity: 0;
      transform: translateY(8px);
    }

    .site-nav.open li {
      animation: mobileLinkIn 0.24s var(--ease) forwards;
    }

    .site-nav.open li:nth-child(1) { animation-delay: 0.02s; }
    .site-nav.open li:nth-child(2) { animation-delay: 0.04s; }
    .site-nav.open li:nth-child(3) { animation-delay: 0.06s; }
    .site-nav.open li:nth-child(4) { animation-delay: 0.08s; }
    .site-nav.open li:nth-child(5) { animation-delay: 0.10s; }
    .site-nav.open li:nth-child(6) { animation-delay: 0.12s; }

    .site-nav a {
      position: relative;
      width: 100%;
      min-height: auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0.42rem 0;
      border-radius: 0;
      color: var(--text);
      background: transparent;
      box-shadow: none;
      font-size: clamp(1.85rem, 7vw, 2.55rem);
      font-weight: 760;
      line-height: 1.16;
      letter-spacing: -0.044em;
      transition:
        color 0.16s var(--ease),
        transform 0.16s var(--ease),
        opacity 0.16s var(--ease);
    }

    .site-nav a:hover,
    .site-nav a:focus-visible {
      color: var(--nf-green-dark);
      background: transparent;
      outline: none;
      transform: translateX(6px);
    }

    .site-nav a::after {
      content: "";
      position: absolute;
      right: 0.1rem;
      top: 50%;
      width: 8px;
      height: 8px;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
      opacity: 0;
      transform: translateY(-50%) rotate(45deg) translateX(-6px);
      transition:
        opacity 0.16s var(--ease),
        transform 0.16s var(--ease);
    }

    .site-nav a:hover::after,
    .site-nav a:focus-visible::after {
      opacity: 0.45;
      transform: translateY(-50%) rotate(45deg) translateX(0);
    }

    .site-nav .nav-link.active,
    .site-nav .nav-link.active:hover,
    .site-nav .nav-link.active:focus-visible {
      color: var(--nf-green-dark) !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    .site-nav .nav-link.active::before {
      content: "";
      position: absolute;
      left: -1rem;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: var(--radius-pill);
      background: var(--nf-green);
      transform: translateY(-50%);
    }

    .site-nav .nav-link.active::after {
      display: none;
    }
  }

  @media (max-width: 480px) {
    .site-header {
      padding-top: 0.82rem;
      padding-bottom: 0.82rem;
    }

    .logo {
      width: 150px;
      height: 52px;
    }

    .logo img {
      height: 54px;
      max-width: 142px;
    }

    .burger {
      width: 44px;
      height: 44px;
    }

    .site-nav {
      padding: 6.8rem 1.75rem 2.25rem;
    }

    .site-nav ul {
      width: 100%;
    }

    .site-nav a {
      font-size: clamp(1.72rem, 8.4vw, 2.25rem);
      padding: 0.44rem 0;
    }
  }
</style>

<header class="site-header">
  <div class="container">
    <div class="site-header-inner">
      <a href="index.html" class="logo" aria-label="Nordkern Fitness Startseite">
        <img src="images/nordkern-fitness-logo.png" alt="Nordkern Fitness Logo" />
      </a>

      <nav id="site-navigation" class="site-nav" aria-label="Hauptnavigation">
        <ul>
          <li><a href="index.html" class="nav-link">Startseite</a></li>
          <li><a href="mitgliedschaften.html" class="nav-link">Tarife</a></li>
          <li><a href="standorte.html" class="nav-link">Standorte</a></li>
          <li><a href="app.html" class="nav-link">App</a></li>
          <li><a href="hausordnung.html" class="nav-link">Hausordnung</a></li>
          <li><a href="kontakt.html" class="nav-link">Kontakt</a></li>
        </ul>
      </nav>

      <button
        id="burger"
        class="burger"
        type="button"
        aria-label="Menü öffnen"
        aria-expanded="false"
        aria-controls="site-navigation"
      >
        <span class="burger-lines" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    </div>
  </div>
</header>
