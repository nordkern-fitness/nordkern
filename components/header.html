<style>
  .site-header {
    position: fixed;
    inset: 0 0 auto;
    z-index: 9000;
    padding: 0;
    background: transparent;
    pointer-events: none;
  }

  .site-header::before {
    content: "";
    position: absolute;
    inset: 0;
    height: 76px;
    background: transparent;
    border-bottom: 1px solid transparent;
    backdrop-filter: blur(0) saturate(100%);
    -webkit-backdrop-filter: blur(0) saturate(100%);
    transition:
      background-color var(--fast),
      border-color var(--fast),
      backdrop-filter var(--fast),
      -webkit-backdrop-filter var(--fast);
    pointer-events: none;
  }

  .site-header:has(.site-header-inner.scrolled)::before {
    background: rgba(251, 251, 253, 0.82);
    border-bottom-color: rgba(0, 0, 0, 0.055);
    backdrop-filter: blur(22px) saturate(170%);
    -webkit-backdrop-filter: blur(22px) saturate(170%);
  }

  .site-header .container {
    pointer-events: none;
  }

  .site-header-inner {
    position: relative;
    width: 100%;
    max-width: var(--max-width);
    min-height: 76px;
    margin-inline: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.4rem;
    background: transparent;
    pointer-events: auto;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    justify-content: flex-start;
    flex: 0 0 auto;
    width: 176px;
    height: 56px;
    line-height: 0;
    overflow: visible;
  }

  .logo img {
    width: auto;
    height: 58px;
    max-width: 168px;
    object-fit: contain;
    image-rendering: auto;
    transform: translateY(1px);
  }

  .site-nav,
  .burger {
    position: relative;
    z-index: 5;
  }

  .site-nav ul {
    display: flex;
    align-items: center;
    gap: 0.15rem;
  }

  .site-nav a {
    position: relative;
    min-height: 40px;
    display: inline-flex;
    align-items: center;
    padding: 0.55rem 0.72rem;
    color: rgba(29, 29, 31, 0.74);
    border-radius: 999px;
    font-size: 0.92rem;
    font-weight: 650;
    letter-spacing: -0.016em;
    transition:
      color var(--fast),
      background-color var(--fast),
      transform var(--fast);
  }

  .site-nav a:hover,
  .site-nav a:focus-visible {
    color: var(--text);
    background: rgba(0, 0, 0, 0.045);
    transform: translateY(-1px);
  }

  .nav-link.active,
  .nav-link.active:hover,
  .nav-link.active:focus-visible {
    color: var(--nf-green-dark) !important;
    background: transparent !important;
  }

  .nav-link.active::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0.28rem;
    width: 18px;
    height: 2px;
    border-radius: 999px;
    background: var(--nf-green);
    transform: translateX(-50%);
  }

  .burger {
    width: 42px;
    height: 42px;
    display: none;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    border-radius: 999px;
    color: var(--text);
    background: rgba(245, 245, 247, 0.92);
    border: 1px solid rgba(0, 0, 0, 0.065);
    box-shadow: none;
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    transition:
      background-color var(--fast),
      transform var(--fast);
  }

  .burger:hover,
  .burger:focus-visible {
    background: #ffffff;
    transform: translateY(-1px);
  }

  .burger-lines {
    position: relative;
    width: 18px;
    height: 14px;
    display: block;
  }

  .burger-lines span {
    position: absolute;
    left: 50%;
    width: 18px;
    height: 1.7px;
    border-radius: 999px;
    background: rgba(29, 29, 31, 0.9);
    transform: translateX(-50%);
    transform-origin: center;
    transition:
      top 0.22s var(--ease),
      transform 0.22s var(--ease),
      opacity 0.16s var(--ease),
      width 0.22s var(--ease);
  }

  .burger-lines span:nth-child(1) {
    top: 2px;
  }

  .burger-lines span:nth-child(2) {
    top: 6.5px;
  }

  .burger-lines span:nth-child(3) {
    top: 11px;
  }

  .burger.is-active .burger-lines span:nth-child(1) {
    top: 6.5px;
    transform: translateX(-50%) rotate(45deg);
  }

  .burger.is-active .burger-lines span:nth-child(2) {
    opacity: 0;
    width: 0;
  }

  .burger.is-active .burger-lines span:nth-child(3) {
    top: 6.5px;
    transform: translateX(-50%) rotate(-45deg);
  }

  @media (max-width: 980px) {
    body.nav-open::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 8998;
      background: rgba(251, 251, 253, 0.92);
      backdrop-filter: blur(24px) saturate(165%);
      -webkit-backdrop-filter: blur(24px) saturate(165%);
      animation: mobileMenuBackdropIn 0.2s var(--ease) both;
    }

    .site-header {
      z-index: 10000;
    }

    .site-header::before {
      height: 74px;
    }

    .site-header:has(.site-header-inner.scrolled)::before,
    body.nav-open .site-header::before {
      background: rgba(251, 251, 253, 0.86);
      border-bottom-color: rgba(0, 0, 0, 0.055);
      backdrop-filter: blur(22px) saturate(170%);
      -webkit-backdrop-filter: blur(22px) saturate(170%);
    }

    .site-header-inner,
    .site-header-inner.scrolled {
      min-height: 74px;
    }

    .logo {
      position: relative;
      z-index: 10004;
      width: 158px;
      height: 54px;
    }

    .logo img {
      height: 54px;
      max-width: 148px;
      transform: translateY(1px);
    }

    .burger {
      position: relative;
      z-index: 10004;
      width: 42px;
      height: 42px;
      display: inline-flex;
    }

    .burger.is-active {
      background: #ffffff;
    }

    .site-nav {
      position: fixed;
      inset: 0;
      z-index: 9999;
      width: 100%;
      height: 100vh;
      display: block;
      margin: 0;
      padding: 7.2rem 2rem 2.4rem;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-8px);
      transition:
        opacity 0.2s var(--ease),
        visibility 0.2s var(--ease),
        transform 0.2s var(--ease);
      background: transparent;
    }

    .site-nav.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
      animation: mobileNavIn 0.2s var(--ease) both;
    }

    .site-nav ul {
      width: min(100%, 430px);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.12rem;
      padding: 0;
      margin: 0 auto;
      background: transparent;
      overflow: visible;
    }

    .site-nav li {
      display: block;
      opacity: 0;
      transform: translateY(8px);
    }

    .site-nav.open li {
      animation: mobileLinkIn 0.24s var(--ease) forwards;
    }

    .site-nav.open li:nth-child(1) { animation-delay: 0.02s; }
    .site-nav.open li:nth-child(2) { animation-delay: 0.04s; }
    .site-nav.open li:nth-child(3) { animation-delay: 0.06s; }
    .site-nav.open li:nth-child(4) { animation-delay: 0.08s; }
    .site-nav.open li:nth-child(5) { animation-delay: 0.10s; }
    .site-nav.open li:nth-child(6) { animation-delay: 0.12s; }

    .site-nav a {
      position: relative;
      width: 100%;
      min-height: auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0.44rem 0;
      border-radius: 0;
      color: var(--text);
      background: transparent;
      font-size: clamp(1.75rem, 6.6vw, 2.42rem);
      font-weight: 760;
      line-height: 1.14;
      letter-spacing: -0.044em;
      transition:
        color 0.16s var(--ease),
        transform 0.16s var(--ease),
        opacity 0.16s var(--ease);
    }

    .site-nav a:hover,
    .site-nav a:focus-visible {
      color: var(--nf-green-dark);
      background: transparent;
      outline: none;
      transform: translateX(5px);
    }

    .site-nav a::after {
      content: "";
      position: absolute;
      right: 0.1rem;
      top: 50%;
      width: 8px;
      height: 8px;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
      opacity: 0;
      transform: translateY(-50%) rotate(45deg) translateX(-6px);
      transition:
        opacity 0.16s var(--ease),
        transform 0.16s var(--ease);
    }

    .site-nav a:hover::after,
    .site-nav a:focus-visible::after {
      opacity: 0.45;
      transform: translateY(-50%) rotate(45deg) translateX(0);
    }

    .site-nav .nav-link.active,
    .site-nav .nav-link.active:hover,
    .site-nav .nav-link.active:focus-visible {
      color: var(--nf-green-dark) !important;
      background: transparent !important;
    }

    .site-nav .nav-link.active::before {
      content: "";
      position: absolute;
      left: -1rem;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--nf-green);
      transform: translateY(-50%);
    }

    .site-nav .nav-link.active::after {
      display: none;
    }
  }

  @media (max-width: 480px) {
    .site-header::before {
      height: 70px;
    }

    .site-header-inner,
    .site-header-inner.scrolled {
      min-height: 70px;
    }

    .logo {
      width: 148px;
      height: 52px;
    }

    .logo img {
      height: 50px;
      max-width: 140px;
    }

    .burger {
      width: 40px;
      height: 40px;
    }

    .site-nav {
      padding: 6.7rem 1.75rem 2.25rem;
    }

    .site-nav ul {
      width: 100%;
    }

    .site-nav a {
      font-size: clamp(1.62rem, 8vw, 2.18rem);
      padding: 0.44rem 0;
    }
  }
</style>

<header class="site-header">
  <div class="container">
    <div class="site-header-inner">
      <a href="index.html" class="logo" aria-label="Nordkern Fitness Startseite">
        <img src="images/nordkern-fitness-logo.png" alt="Nordkern Fitness Logo" />
      </a>

      <nav id="site-navigation" class="site-nav" aria-label="Hauptnavigation">
        <ul>
          <li><a href="index.html" class="nav-link">Startseite</a></li>
          <li><a href="mitgliedschaften.html" class="nav-link">Tarife</a></li>
          <li><a href="standorte.html" class="nav-link">Standorte</a></li>
          <li><a href="app.html" class="nav-link">App</a></li>
          <li><a href="hausordnung.html" class="nav-link">Hausordnung</a></li>
          <li><a href="kontakt.html" class="nav-link">Kontakt / FAQ</a></li>
        </ul>
      </nav>

      <button
        id="burger"
        class="burger"
        type="button"
        aria-label="Menü öffnen"
        aria-expanded="false"
        aria-controls="site-navigation"
      >
        <span class="burger-lines" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    </div>
  </div>
</header>
